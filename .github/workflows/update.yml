name: Update Proxies

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download proxies via proxy
        run: |
          echo "开始下载 proxies.json..."
          curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "https://proxy.api.030101.xyz/https://www.mtproto.shop/proxies.json" \
            -o proxies.json
          echo "下载完成"

      - name: Check file
        run: |
          ls -lh proxies.json
          echo "文件前200字符:"
          head -c 200 proxies.json

      - name: Validate JSON
        run: |
          python3 - <<EOF
          import json
          import sys

          try:
              with open("proxies.json","r",encoding="utf-8") as f:
                  json.load(f)
              print("JSON 验证成功")
          except Exception as e:
              print("JSON 验证失败，可能下载内容不是 JSON")
              sys.exit(0)  # 不报错，workflow 继续
          EOF

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add proxies.json
          if git diff --cached --quiet; then
            echo "没有数据变化"
            exit 0
          fi
          git commit -m "auto update proxies"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
