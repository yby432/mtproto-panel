name: Update Proxies
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download proxies
        run: |
          curl -L https://www.mtproto.shop/proxies.json -o proxies.json || true
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add proxies.json
          git commit -m "update proxies" || exit 0
          git push
